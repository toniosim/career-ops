<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — Resume</title>
<style>
  /* Antonio's Resume Style */
  @font-face {
    font-family: 'Inter';
    src: url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Helvetica', 'Arial', sans-serif; /* Professional standard matching your PDF */
    font-size: 10.5pt;
    line-height: 1.35;
    color: #333;
    padding: 0.5in 0.6in;
  }

  /* Colors */
  :root {
    --primary-blue: #2c5282; /* Professional Blue */
    --accent-blue: #4299e1;
  }

  /* Header */
  .header {
    text-align: left;
    margin-bottom: 15px;
  }

  .header h1 {
    font-size: 26pt;
    color: var(--primary-blue);
    font-weight: 700;
    margin-bottom: 2px;
  }

  .header .title {
    font-size: 14pt;
    color: var(--primary-blue);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .contact-info {
    font-size: 10pt;
    color: #4a5568;
  }

  .contact-info .separator {
    margin: 0 6px;
    color: #cbd5e0;
  }

  .contact-info a {
    color: inherit;
    text-decoration: none;
  }

  /* Section Headers */
  .section {
    margin-bottom: 15px;
  }

  .section-title {
    font-size: 11pt;
    font-weight: 700;
    color: var(--primary-blue);
    text-transform: uppercase;
    border-bottom: 1px solid var(--primary-blue);
    margin-bottom: 10px;
    padding-bottom: 2px;
  }

  /* Technical Skills Table Style */
  .skills-container {
    display: table;
    width: 100%;
    margin-bottom: 5px;
  }

  .skill-row {
    display: table-row;
  }

  .skill-label {
    display: table-cell;
    font-weight: 700;
    color: var(--primary-blue);
    width: 160px;
    padding-bottom: 4px;
  }

  .skill-values {
    display: table-cell;
    padding-bottom: 4px;
  }

  /* Experience */
  .job {
    margin-bottom: 12px;
  }

  .job-header {
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    font-size: 11pt;
    margin-bottom: 2px;
  }

  .job-company-role {
    color: var(--primary-blue);
  }

  .job-meta {
    font-style: italic;
    font-weight: 400;
    font-size: 10pt;
    color: #4a5568;
    margin-bottom: 5px;
  }

  .job ul {
    list-style-type: disc;
    margin-left: 20px;
  }

  .job li {
    margin-bottom: 3px;
    padding-left: 5px;
  }

  /* Education */
  .edu-item {
    margin-bottom: 8px;
  }

  .edu-header {
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    color: var(--primary-blue);
  }

  .edu-org {
    font-weight: 400;
    font-style: italic;
    color: #4a5568;
  }

  /* Page Break Control */
  @media print {
    body { padding: 0; }
    .page { width: 100%; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="title">Software Development Engineer in Test</div>
    <div class="contact-info">
      {{LOCATION}} <span class="separator">·</span> 
      <a href="mailto:{{EMAIL}}">{{EMAIL}}</a> <span class="separator">·</span> 
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Professional Summary</div>
    <div class="summary-text">{{SUMMARY_TEXT}}</div>
  </div>

  <div class="section">
    <div class="section-title">Technical Skills</div>
    <div class="skills-container">
      {{SKILLS_HTML}}
    </div>
  </div>

  <div class="section">
    <div class="section-title">Professional Experience</div>
    {{EXPERIENCE}}
  </div>

  <div class="section">
    <div class="section-title">Education</div>
    {{EDUCATION}}
  </div>
</div>
</body>
</html>
